<div class="page">
  <header class="page-head">
    <h1 class="page-title">Comunidad</h1>
  </header>

  <nav class="subtabs" aria-label="Secciones de comunidad">
    <a class="subtab subtab--active" href="javascript:void(0)">Comentarios</a>

    <a class="subtab" href="javascript:void(0)">Menciones</a>

  <section class="card" aria-label="Filtros">
    <div class="filters">
      <button class="chip" type="button">Publicados</button>
      <button class="chip" type="button">Ordenar por</button>
      <button class="chip" type="button">Estado de respuesta: Sin respuesta</button>

  <section class="card" aria-label="Comentarios">
    <div class="card-title">Comentarios</div>

    <article class="row" aria-label="Comentario 1">
      <div class="cell cell--check"><input type="checkbox" aria-label="Seleccionar" /></div>
      <div class="cell cell--main">
        <div class="avatar" aria-hidden="true">R</div>
        <div class="body">
          <div class="meta">@usuario · hace poco</div>
          <div class="text">¡Buen contenido!</div>
          <div class="actions">
            <button class="btn" type="button">Responder</button>
          </div>
        </div>
      </div>
      <div class="cell cell--thumb"><div class="thumb" aria-hidden="true"></div></div>
    </article>

    <article class="row" aria-label="Comentario 2">
      <div class="cell cell--check"><input type="checkbox" aria-label="Seleccionar" /></div>
      <div class="cell cell--main">
        <div class="avatar" aria-hidden="true">K</div>
        <div class="body">
          <div class="meta">@usuario · hace poco</div>
          <div class="text">¿Cuándo sale el próximo curso?</div>
          <div class="actions">
            <button class="btn" type="button">Responder</button>
          </div>
        </div>

    </article>
