<div class="floating-label" [class.is-valid]="showValidState">
  <input
    [id]="id"
    [type]="type"
    placeholder="{{ placeholder }}"
    aria-label="{{ label }}"
    title="{{ label }}"
    [attr.autocomplete]="autocomplete"
    [attr.inputmode]="inputmode"
    [attr.pattern]="pattern"
    [formControl]="control"
  />

  <label [for]="id">{{ label }}</label>

  <div class="icon" aria-hidden="true">
    <ng-container [ngSwitch]="icon">
      <svg *ngSwitchCase="'email'" viewBox="0 0 100 100">
        <path
          d="m17.5 977c-1.3 0-2.4 1.1-2.4 2.4v45.9c0 1.3 1.1 2.4 2.4 2.4h64.9c1.3 0 2.4-1.1 2.4-2.4v-45.9c0-1.3-1.1-2.4-2.4-2.4h-64.9zm2.4 4.8h60.2v1.2l-30.1 22-30.1-22v-1.2zm0 7l28.7 21c0.8 0.6 2 0.6 2.8 0l28.7-21v34.1h-60.2v-34.1z"
          transform="translate(0 -952.36)"
        />
      </svg>

      <svg *ngSwitchCase="'password'" viewBox="0 0 24 24">
        <path d="M19,21H5V9h14V21z M6,20h12V10H6V20z" />
        <path
          d="M16.5,10h-1V7c0-1.9-1.6-3.5-3.5-3.5S8.5,5.1,8.5,7v3h-1V7c0-2.5,2-4.5,4.5-4.5s4.5,2,4.5,4.5V10z"
        />
        <circle cx="12" cy="15" r="1.5" />
      </svg>

      <svg *ngSwitchCase="'name'" viewBox="0 0 24 24">
        <path
          d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"
        />
      </svg>

      <svg *ngSwitchDefault viewBox="0 0 24 24">
        <path
          d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"
        />
      </svg>
    </ng-container>
  </div>
</div>
