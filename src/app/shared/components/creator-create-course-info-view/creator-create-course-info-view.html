<form class="panel info-form" (ngSubmit)="next.emit()">
    <div class="field">
      <label for="course-title">Título</label>
      <input id="course-title" type="text" [(ngModel)]="course.title" name="title" required minlength="2" />
    </div>

    <div class="field">
      <label for="course-desc">Descripción</label>
      <textarea
        id="course-desc"
        [(ngModel)]="course.description"
        name="description"
        rows="4"
        required
        minlength="10"
      ></textarea>
    </div>

    <div class="field">
      <label for="course-difficulty">Dificultad</label>
      <select id="course-difficulty" [(ngModel)]="course.difficultyLevel" name="difficultyLevel" required>
        <option value="BEGINNER">Principiante</option>
        <option value="INTERMEDIATE">Intermedio</option>
        <option value="ADVANCED">Avanzado</option>
      </select>
    </div>

    <div class="field">
      <label for="course-category">Categoría</label>
      <select id="course-category" [(ngModel)]="course.category" name="category" required>
        <option value="BASIC_TECHNIQUES">Técnicas básicas</option>
        <option value="PASTRY">Pastelería</option>
        <option value="INTERNATIONAL_CUISINE">Cocina internacional</option>
        <option value="MIXOLOGY">Mixología</option>
        <option value="RESTAURANT_MANAGEMENT">Gestión de restaurante</option>
        <option value="MOLECULAR_CUISNE">Cocina molecular</option>
        <option value="BAKING">Horneado</option>
        <option value="SMMELIER">Sommelier</option>
        <option value="NUTRION">Nutrición</option>
        <option value="FOOD_PHOTOGRAPHY">Fotografía gastronómica</option>
      </select>
    </div>

    <div class="field">
      <label for="course-cuisine">Tipo de cocina</label>
      <select id="course-cuisine" [(ngModel)]="course.cuisineType" name="cuisineType" required>
        <option value="NONE">N/A</option>
        <option value="ITALIAN">Italiana</option>
        <option value="FRENCH">Francesa</option>
        <option value="ASIAN">Asiática</option>
        <option value="LATIN_AMERICAN">Latinoamericana</option>
        <option value="MEDITERRANEAN">Mediterránea</option>
        <option value="MIDDLE_EASTERN">Medio Oriente</option>
        <option value="AFRICAN">Africana</option>
        <option value="AMERICAN">Americana</option>
        <option value="FUSION">Fusión</option>
        <option value="OTHER">Otra</option>
      </select>
    </div>

    <div class="field">
      <label for="course-cover">Imagen de portada (URL)</label>
      <input id="course-cover" type="text" [(ngModel)]="course.coverImageUrl" name="coverImageUrl" />
    </div>

    <div class="field">
      <label for="course-tags">Tags</label>
      <input id="course-tags" type="text" [(ngModel)]="course.tags" name="tags" />
      <p class="hint">Ej: pasta, salsas, técnicas</p>
    </div>

    <div class="field">
      <label for="course-language">Idioma</label>
      <input id="course-language" type="text" [(ngModel)]="course.language" name="language" />
    </div>

    <div class="actions">
      <button type="button" class="btn ghost" (click)="saveCourseInfo.emit()" [disabled]="savingCourse">
        {{ savingCourse ? 'Guardando...' : 'Guardar información' }}
      </button>
      <button type="button" class="btn secondary" (click)="cancel.emit()">Cancelar</button>
      <button type="submit" class="btn">Siguiente</button>
    </div>

    <div class="info" *ngIf="createdCourseId">Curso creado con ID: <strong>{{ createdCourseId }}</strong></div>
</form>
