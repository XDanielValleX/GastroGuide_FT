<div class="page">
  <header class="page-head">
    <h1 class="page-title">Estadísticas del canal</h1>
  </header>

  <nav class="subtabs" aria-label="Secciones de analíticas">
    <a class="subtab subtab--active" href="javascript:void(0)">Resumen</a>
    <a class="subtab" href="javascript:void(0)">Contenido</a>
    <a class="subtab" href="javascript:void(0)">Público</a>
    <a class="subtab" href="javascript:void(0)">Tendencias</a>
  </nav>

  <section class="grid" aria-label="Analíticas">
    <div class="main">
      <article class="card" aria-label="Resumen últimos 28 días">
        <div class="card-title">Tu canal recibió — vistas en los últimos 28 días</div>

        <div class="kpis" aria-label="Indicadores">
          <div class="kpi">
            <div class="kpi-label">Vistas</div>
            <div class="kpi-value">—</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Tiempo de reproducción (horas)</div>
            <div class="kpi-value">—</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Suscriptores</div>
            <div class="kpi-value">—</div>
          </div>
        </div>

        <div class="chart" aria-hidden="true"></div>
        <div class="chart-actions">
          <button class="btn" type="button">Ver más</button>
        </div>
      </article>
    </div>

    <aside class="side" aria-label="Tiempo real">
      <article class="card">
        <div class="card-title">Tiempo real</div>
        <div class="rt">
          <div class="rt-number">—</div>
          <div class="rt-sub">Vistas · Últimas 48 horas</div>
        </div>
        <div class="bars" aria-hidden="true"></div>
        <div class="side-list" aria-label="Contenido principal">
          <div class="side-title">Contenido principal</div>
          <div class="side-item">
            <div class="mini-thumb" aria-hidden="true"></div>
            <div class="side-meta">
              <div class="side-name">Contenido A</div>
              <div class="side-sub">— vistas</div>
            </div>
          </div>
          <div class="side-item">
            <div class="mini-thumb" aria-hidden="true"></div>
            <div class="side-meta">
              <div class="side-name">Contenido B</div>
              <div class="side-sub">— vistas</div>
            </div>
          </div>
        </div>
      </article>
    </aside>
  </section>
</div>
