<div class="session">
    <div
        class="left home-logo-btn"
        role="button"
        tabindex="0"
        aria-label="Volver al inicio"
        title="Ir a GastroGuide"
        (click)="goHome()"
        (keydown.enter)="goHome()"
        (keydown.space)="goHome()"
    >
        <svg viewBox="0 0 300 302.5" aria-hidden="true">
            <path
                d="m126 302.2c-2.3 0.7-5.7 0.2-7.7-1.2l-105-71.6c-2-1.3-3.7-4.4-3.9-6.7l-9.4-126.7c-0.2-2.4 1.1-5.6 2.8-7.2l93.2-86.4c1.7-1.6 5.1-2.6 7.4-2.3l125.6 18.9c2.3 0.4 5.2 2.3 6.4 4.4l63.5 110.1c1.2 2 1.4 5.5 0.6 7.7l-46.4 118.3c-0.9 2.2-3.4 4.6-5.7 5.3l-121.4 37.4zm63.4-102.7c2.3-0.7 4.8-3.1 5.7-5.3l19.9-50.8c0.9-2.2 0.6-5.7-0.6-7.7l-27.3-47.3c-1.2-2-4.1-4-6.4-4.4l-53.9-8c-2.3-0.4-5.7 0.7-7.4 2.3l-40 37.1c-1.7 1.6-3 4.9-2.8 7.2l4.1 54.4c0.2 2.4 1.9 5.4 3.9 6.7l45.1 30.8c2 1.3 5.4 1.9 7.7 1.2l52-16.2z"
            />
        </svg>
    </div>

    <form class="sign-up" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <h4>• <span>Create Account</span> •</h4>

        <app-role-selector
            [value]="selectedRole"
            (valueChange)="onRoleChange($event)"
        />

        <div *ngIf="errorMessage" class="inline-alert" role="alert">
            {{ errorMessage }}
        </div>

        <ng-container *ngIf="selectedRole === 'STUDENT'">
            <app-auth-floating-input
                id="username"
                label="Username:"
                type="text"
                placeholder="username"
                autocomplete="username"
                icon="user"
                [control]="usernameCtrl"
            />
        </ng-container>

        <ng-container *ngIf="selectedRole === 'CREATOR'">
            <div class="row">
                <div class="row-col">
                    <app-auth-floating-input
                        id="firstName"
                        label="First name:"
                        type="text"
                        placeholder="first name"
                        autocomplete="given-name"
                        icon="name"
                        [control]="firstNameCtrl"
                    />
                </div>
                <div class="row-col">
                    <app-auth-floating-input
                        id="lastName"
                        label="Last name:"
                        type="text"
                        placeholder="last name"
                        autocomplete="family-name"
                        icon="name"
                        [control]="lastNameCtrl"
                    />
                </div>
            </div>

            <div class="row">
                <div class="row-col">
                    <app-auth-floating-input
                        id="identificationNumber"
                        label="Identification number:"
                        type="text"
                        placeholder="123456789"
                        [inputmode]="'numeric'"
                        [pattern]="'[0-9]*'"
                        icon="user"
                        [control]="identificationNumberCtrl"
                    />
                </div>
                <div class="row-col">
                    <div
                        class="floating-label select"
                        [class.is-valid]="identificationTypeCtrl.valid && (identificationTypeCtrl.dirty || identificationTypeCtrl.touched)"
                    >
                        <select
                            id="identificationType"
                            formControlName="identificationType"
                            aria-label="Identification type:"
                            title="Identification type:"
                        >
                            <option value="CC">CC</option>
                            <option value="CE">CE</option>
                            <option value="PASSPORT">PASSPORT</option>
                            <option value="TI">TI</option>
                            <option value="NIT">NIT</option>
                            <option value="OTHER">OTHER</option>
                        </select>

                        <label for="identificationType">Identification type:</label>

                        <div class="icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"
                                />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <div
                class="floating-label select"
                [class.is-valid]="nationalityCtrl.valid && (nationalityCtrl.dirty || nationalityCtrl.touched)"
            >
                <select
                    id="nationality"
                    formControlName="nationality"
                    aria-label="Nationality:"
                    title="Nationality:"
                >
                    <option value="Colombiana">Colombiana</option>
                    <option value="Mexicana">Mexicana</option>
                    <option value="Peruana">Peruana</option>
                    <option value="Argentina">Argentina</option>
                    <option value="Chilena">Chilena</option>
                    <option value="Española">Española</option>
                    <option value="Otra">Otra</option>
                </select>

                <label for="nationality">Nationality:</label>

                <div class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"
                        />
                    </svg>
                </div>
            </div>

            <app-auth-floating-input
                id="specialization"
                label="Specialization:"
                type="text"
                placeholder="Experto en..."
                icon="user"
                [control]="specializationCtrl"
            />
        </ng-container>

        <app-auth-floating-input
            id="email"
            label="Email:"
            type="email"
            placeholder="email"
            autocomplete="email"
            icon="email"
            [control]="emailCtrl"
        />

        <app-auth-floating-input
            id="password"
            label="Password:"
            type="password"
            placeholder="password"
            autocomplete="new-password"
            icon="password"
            [control]="passwordCtrl"
        />

        <app-auth-floating-input
            id="confirmPassword"
            label="Confirm password:"
            type="password"
            placeholder="confirm password"
            autocomplete="new-password"
            icon="password"
            [control]="confirmPasswordCtrl"
        />

        <div
            *ngIf="registerForm.errors?.['passwordMismatch'] && (confirmPasswordCtrl.dirty || confirmPasswordCtrl.touched)"
            class="inline-alert"
            role="alert"
        >
            Las contraseñas no coinciden.
        </div>

        <button type="submit" [disabled]="registerForm.invalid || loading">
            {{ loading ? 'Signing up...' : 'Sign up' }}
        </button>

        <a routerLink="/auth/login" class="discrete">Already have an account?</a>
    </form>
</div>
