<div class="session">
    <div class="left home-logo-btn" role="button" tabindex="0" aria-label="Volver al inicio" title="Ir a GastroGuide"
        (click)="goHome()" (keydown.enter)="goHome()" (keydown.space)="goHome()">
        <svg viewBox="0 0 300 302.5" aria-hidden="true">
            <path
                d="m126 302.2c-2.3 0.7-5.7 0.2-7.7-1.2l-105-71.6c-2-1.3-3.7-4.4-3.9-6.7l-9.4-126.7c-0.2-2.4 1.1-5.6 2.8-7.2l93.2-86.4c1.7-1.6 5.1-2.6 7.4-2.3l125.6 18.9c2.3 0.4 5.2 2.3 6.4 4.4l63.5 110.1c1.2 2 1.4 5.5 0.6 7.7l-46.4 118.3c-0.9 2.2-3.4 4.6-5.7 5.3l-121.4 37.4zm63.4-102.7c2.3-0.7 4.8-3.1 5.7-5.3l19.9-50.8c0.9-2.2 0.6-5.7-0.6-7.7l-27.3-47.3c-1.2-2-4.1-4-6.4-4.4l-53.9-8c-2.3-0.4-5.7 0.7-7.4 2.3l-40 37.1c-1.7 1.6-3 4.9-2.8 7.2l4.1 54.4c0.2 2.4 1.9 5.4 3.9 6.7l45.1 30.8c2 1.3 5.4 1.9 7.7 1.2l52-16.2z" />
        </svg>
    </div>

    <form class="log-in" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <h4>GastroGuide</h4>

        <app-auth-floating-input
            id="email"
            label="Email:"
            type="email"
            placeholder="email"
            autocomplete="email"
            [inputmode]="'email'"
            icon="email"
            [control]="emailCtrl"
        />

        <app-auth-floating-input
            id="password"
            label="Password:"
            type="password"
            placeholder="password"
            autocomplete="current-password"
            icon="password"
            [control]="passwordCtrl"
        />

        <div *ngIf="loginError" class="inline-alert" role="alert">
            {{ loginErrorMessage || 'Credenciales incorrectas. Intenta de nuevo.' }}
        </div>

        <div *ngIf="registerSuccess" class="inline-success" role="status">
            <ng-container *ngIf="registeredRole === 'CREATOR'; else registeredDefault">
                Registro exitoso. Tu cuenta debe ser verificada por un administrador antes de iniciar sesión.
            </ng-container>
            <ng-template #registeredDefault>
                Registro exitoso. Por favor inicia sesión.
            </ng-template>
        </div>

        <button type="submit" [disabled]="loginForm.invalid || loading">
            {{ loading ? 'Logging in...' : 'Log in' }}
        </button>

        <a routerLink="/auth/register" class="discrete">Register now</a>

    </form>
</div>
